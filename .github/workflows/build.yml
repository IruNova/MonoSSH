name: Build MonoSSH

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: Go and JS checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Go test
        run: go test ./...

      - name: JavaScript syntax check
        run: |
          node --check main.js
          node --check preload.js
          node --check renderer/app.js

  build-windows:
    name: Build Windows exe
    runs-on: windows-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build portable Windows exe
        run: npm run dist:win:ps

      - name: Upload portable exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: MonoSSH-windows-x64-portable
          path: dist/*.exe

      - name: Upload unpacked app artifact
        uses: actions/upload-artifact@v4
        with:
          name: MonoSSH-windows-x64-unpacked
          path: dist/win-unpacked/**
